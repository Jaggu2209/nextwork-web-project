name: Echo Hi

on:
  workflow_dispatch: 
  push:

jobs:
  say-hi:
    runs-on: ubuntu-latest
    steps:
      - name: Echo message
        run: |
          {
            echo "Job started"
            echo "hi there"
            echo "Job finished"
          } 2>&1 | tee job.log
        
      - name: Send logs to n8n
        run: |
          curl -X POST \
            -H "Content-Type: application/json" \
            -d @<(jq -Rs '{logs: .}' job.log) \
            https://unfalsified-stellularly-burl.ngrok-free.dev/webhook-test/github-logs
